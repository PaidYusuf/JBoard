services:

  postgres:
    image: postgres:16-alpine
    container_name: jboard_postgres
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No external port — only backend can reach it on the internal network
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    container_name: jboard_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    # No external port
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: jboard_backend
    restart: always
    env_file: .env.production
    environment:
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    # No external port — only nginx can reach it
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_BACKEND_URL: http://backend:3001
    container_name: jboard_frontend
    restart: always
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: jboard_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
